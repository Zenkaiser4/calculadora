name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          pip install "cython<3.0.0" virtualenv buildozer

      # Forzamos la instalación de las herramientas de Android directamente en la máquina del servidor
      - name: Install Android Build-Tools (Aidl Fix)
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.1" "platform-tools" "platforms;android-33"
          # Agregamos AIDL directamente al PATH global para que el sistema operativo lo encuentre sí o sí
          echo "${ANDROID_HOME}/build-tools/33.0.1" >> $GITHUB_PATH
          echo "${ANDROID_HOME}/platform-tools" >> $GITHUB_PATH

      # Compilamos asegurando que las variables de entorno apunten al SDK correcto
      - name: Build APK
        env:
          APP_ALLOW_ROOT: "1"
          BUILDOZER_ALLOW_KIVY_DEVELOP_BRANCH: "1"
        run: |
          export PATH=$PATH:${ANDROID_HOME}/build-tools/33.0.1:${ANDROID_HOME}/platform-tools
          buildozer -v android debug

      # Buscamos el APK generado de manera flexible para evitar errores de rutas exactas
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/*/build/outputs/apk/debug/*.apk
